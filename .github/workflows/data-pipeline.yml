# Nachtelijke data-pijplijn: haalt feestdagen (offline dataset) en
# Wikidata-festivals op, ontdubbelt en commit assets/events.json.
# GitHub Actions-runners hebben vrij internet, dus de Wikidata-connector
# draait hier wél — gratis, geen eigen server nodig.
name: Data-pijplijn

on:
  schedule:
    - cron: "20 4 * * *"   # elke nacht 04:20 UTC
  workflow_dispatch:        # ook handmatig te starten via de Actions-tab

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Dependencies installeren
        working-directory: pipeline
        run: npm install --no-audit --no-fund
      - name: Connectors draaien
        run: |
          node pipeline/fetch_holidays.js
          node pipeline/fetch_wikidata.js || echo "Wikidata tijdelijk niet bereikbaar — verder met overige bronnen"
          node pipeline/merge.js
      - name: Wijzigingen committen
        run: |
          git config user.name "feestkaart-pijplijn"
          git config user.email "pipeline@users.noreply.github.com"
          git add assets/events.json
          git diff --cached --quiet || git commit -m "Data-pijplijn: events.json ververst"
          git push
